<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reliance Option Chain - Live Data</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Reliance Option Chain</h1>
            <p class="subtitle">Live Option Data via Angle One API</p>
        </header>

        <div class="control-panel">
            <div class="input-group">
                <label for="apiKey">API Key:</label>
                <input type="password" id="apiKey" placeholder="Enter your Angle One API Key">
            </div>
            <div class="input-group">
                <label for="refreshRate">Refresh Rate (seconds):</label>
                <input type="number" id="refreshRate" value="5" min="1" max="60">
            </div>
            <button id="startBtn" class="btn btn-primary">Start Fetching</button>
            <button id="stopBtn" class="btn btn-secondary" disabled>Stop</button>
            <span id="status" class="status">Ready</span>
        </div>

        <div class="filter-panel">
            <input type="text" id="strikeFilter" placeholder="Filter by Strike Price">
            <select id="expiryFilter">
                <option value="">All Expirations</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
            </select>
        </div>

        <div class="table-container">
            <h2>Call Options</h2>
            <table id="callTable" class="option-table">
                <thead>
                    <tr>
                        <th>Strike Price</th>
                        <th>Bid</th>
                        <th>Ask</th>
                        <th>Last Price</th>
                        <th>Volume</th>
                        <th>Open Interest</th>
                        <th>Implied Vol</th>
                        <th>Delta</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="8" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="table-container">
            <h2>Put Options</h2>
            <table id="putTable" class="option-table">
                <thead>
                    <tr>
                        <th>Strike Price</th>
                        <th>Bid</th>
                        <th>Ask</th>
                        <th>Last Price</th>
                        <th>Volume</th>
                        <th>Open Interest</th>
                        <th>Implied Vol</th>
                        <th>Delta</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="8" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="info-panel">
            <h3>Current Spot Price</h3>
            <div id="spotPrice" class="spot-price">-</div>
            <p id="lastUpdate" class="last-update">Last updated: -</p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
